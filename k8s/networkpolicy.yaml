# ============================================================
# NetworkPolicy - Restriction du trafic réseau
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# Seul le trafic Ingress et les Jobs internes sont autorisés
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-app-netpol
  namespace: demo-app
  labels:
    app: k8s-demo
spec:
  podSelector:
    matchLabels:
      app: k8s-demo
  policyTypes:
    - Ingress
  ingress:
    # Autoriser le trafic depuis l'Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Autoriser le trafic interne au namespace (Jobs, etc.)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000
