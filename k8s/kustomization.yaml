apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-app

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pv.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Ressources optionnelles (décommenter selon besoin)
# - job-init.yaml
# - networkpolicy.yaml
# - hpa.yaml

commonLabels:
  project: k8s-demo-tp
  author: khlifi-houcem

commonAnnotations:
  maintainer: "KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD"
