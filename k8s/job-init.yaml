# ============================================================
# Job - Initialisation des données de démonstration
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# Ce Job crée des notes d'exemple au premier déploiement
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-app-init-data
  namespace: demo-app
  labels:
    app: k8s-demo
    component: init
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: k8s-demo
        component: init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-data
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "╔══════════════════════════════════════════════════════╗"
              echo "║  Initialisation des données de démonstration        ║"
              echo "║  KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD       ║"
              echo "╚══════════════════════════════════════════════════════╝"

              # Attendre que l'application soit prête
              echo "[INFO] Attente du service demo-app-service..."
              for i in $(seq 1 30); do
                if curl -sf http://demo-app-service.demo-app.svc.cluster.local/health > /dev/null 2>&1; then
                  echo "[OK] Application accessible !"
                  break
                fi
                echo "[WAIT] Tentative $i/30..."
                sleep 2
              done

              API="http://demo-app-service.demo-app.svc.cluster.local"

              echo "[INFO] Création des notes d'exemple..."

              curl -sf -X POST "$API/api/notes" \
                -H "Content-Type: application/json" \
                -d '{"title":"Bienvenue sur K8s Demo","content":"Cette application est déployée sur Kubernetes avec Namespace, ConfigMap, Secret, PV/PVC, Deployment, Service et Ingress.","category":"important"}'
              echo ""

              curl -sf -X POST "$API/api/notes" \
                -H "Content-Type: application/json" \
                -d '{"title":"Architecture Kubernetes","content":"Les pods communiquent via le Service ClusterIP. Le stockage persistant utilise un PVC lié à un PV. Les secrets sont injectés via des variables d environnement.","category":"general"}'
              echo ""

              curl -sf -X POST "$API/api/notes" \
                -H "Content-Type: application/json" \
                -d '{"title":"TODO: Exercices","content":"1. Modifier le ConfigMap et observer les changements\n2. Scaler le Deployment à 3 replicas\n3. Vérifier la persistance des données\n4. Tester le rolling update","category":"todo"}'
              echo ""

              curl -sf -X POST "$API/api/notes" \
                -H "Content-Type: application/json" \
                -d '{"title":"Idée: Monitoring","content":"Ajouter Prometheus + Grafana pour monitorer les métriques de l application et du cluster Kubernetes.","category":"idea"}'
              echo ""

              echo "[OK] Données d'initialisation créées avec succès !"
