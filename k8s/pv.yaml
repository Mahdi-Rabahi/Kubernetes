# ============================================================
# PersistentVolume - Stockage persistant sur le noeud
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# Note: hostPath pour démo locale (minikube/kind)
#       En production, utiliser un StorageClass adapté (NFS, EBS, etc.)
# ============================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: demo-app-pv
  labels:
    app: k8s-demo
    type: local
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: demo-storage
  hostPath:
    path: /tmp/demo-app-data
    type: DirectoryOrCreate
