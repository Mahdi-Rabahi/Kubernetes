# ============================================================
# Deployment - Déploiement de l'application
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: k8s-demo
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: k8s-demo
        version: v1
    spec:
      containers:
        - name: demo-app
          image: k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP

          # ── Variables depuis ConfigMap ──────────────────────
          envFrom:
            - configMapRef:
                name: demo-app-config

          # ── Variables depuis Secret ────────────────────────
          env:
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret
                  key: APP_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-app-secret
                  key: ADMIN_PASSWORD

          # ── Montage du volume persistant ───────────────────
          volumeMounts:
            - name: data-volume
              mountPath: /data

          # ── Ressources (requests/limits) ───────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # ── Probes de santé ────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

      # ── Volume ───────────────────────────────────────────────
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: demo-app-pvc

      # ── Sécurité ─────────────────────────────────────────────
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
